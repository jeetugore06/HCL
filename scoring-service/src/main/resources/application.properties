spring.application.name=scoring-service
server.port=8082

# ===== Datasource =====
spring.datasource.url=jdbc:mysql://localhost:3307/creditcards_scoring_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Kafka =====
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=scoring-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all

# ===== Scoring rules (externalized; tweak without redeploy) =====
app.scoring.salary-platinum-threshold=200000
app.scoring.salary-visa-threshold=50000
app.scoring.score-platinum=500
app.scoring.score-visa=150
app.scoring.score-pending-documents=50

# ===== Topics =====
app.kafka.customer-registered-topic=customer.registered
app.kafka.customer-scored-topic=customer.scored
