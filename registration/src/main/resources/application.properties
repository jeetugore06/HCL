spring.application.name=registration

# ===== Datasource (override in env / profile-specific files) =====
spring.datasource.url=jdbc:mysql://localhost:3307/creditcards_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema is owned by SQL migrations / DBA — Hibernate must not touch it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Credit-score scheduler -----
# Master switch (set to false to disable the scheduled job entirely).
registration.scheduler.enabled=true
# Cron expression - fires every 10 seconds.
registration.scheduler.cron=*/10 * * * * *
#registration.scheduler.cron=0 */1 * * * * ==> 10mins
# How many pending applications to score per tick.
registration.scheduler.batch-size=10
# External credit-score endpoint (returns a single integer).
registration.scheduler.credit-score-url=http://localhost:8081/api/cibil/check
# RestTemplate timeouts for the credit-score call (milliseconds).
registration.scheduler.connect-timeout-ms=2000
registration.scheduler.read-timeout-ms=5000
