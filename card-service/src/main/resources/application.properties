spring.application.name=card-service
server.port=8083

# ===== Datasource =====
spring.datasource.url=jdbc:mysql://localhost:3307/creditcards_card_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.order_updates=true

# ===== Kafka =====
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=card-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all

# ===== Card-allocation rules (externalized) =====
app.card.platinum-score-threshold=500
app.card.gold-score-threshold=300
app.card.visa-score-threshold=150
app.card.pending-documents-score-threshold=50
app.card.platinum-limit=40000
app.card.gold-limit=20000
app.card.visa-limit=10000
app.card.card-number-length=16
app.card.default-pin-length=4

# ===== Email outbox (dummy notifier) =====
app.notification.outbox-file=email-outbox.log

# ===== Topics =====
app.kafka.customer-scored-topic=customer.scored
app.kafka.card-activated-topic=card.activated
app.kafka.application-pending-docs-topic=application.pending-docs
app.kafka.application-rejected-topic=application.rejected
app.kafka.card-pin-changed-topic=card.pin-changed
